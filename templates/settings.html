<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen — Synology Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card {
      width: 100%; max-width: 420px; padding: 2rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .auth-logo {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.75rem;
    }
    .auth-logo-icon {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .auth-logo-icon svg { width: 20px; height: 20px; color: #fff; }
    .auth-logo-text { font-size: 1.1rem; font-weight: 700; }
    .auth-title { font-size: 1rem; font-weight: 600; margin-bottom: .25rem; }
    .auth-sub   { font-size: .8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    .form-label { font-size: .78rem; font-weight: 500; color: var(--text-muted); }
    .form-input {
      padding: .55rem .75rem;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: .9rem; font-family: var(--font); width: 100%;
      transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px var(--cyan-glow); }
    .form-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.25rem 0 1rem;
    }
    .form-section-label {
      font-size: .72rem; font-weight: 600; color: var(--cyan);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem;
    }
    .btn-save {
      width: 100%; padding: .6rem; margin-top: .5rem;
      background: var(--cyan); border: none; border-radius: var(--radius-sm);
      color: #000; font-size: .9rem; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: opacity .15s;
    }
    .btn-save:hover { opacity: .88; }
    .btn-back {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .8rem; color: var(--text-muted); text-decoration: none;
      margin-bottom: 1.25rem; transition: color .15s;
    }
    .btn-back:hover { color: var(--text); }
    .auth-error {
      background: rgba(255,69,105,.1); border: 1px solid rgba(255,69,105,.3);
      border-radius: var(--radius-sm); padding: .55rem .75rem;
      font-size: .82rem; color: var(--red); margin-bottom: 1rem;
    }
    .auth-success {
      background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25);
      border-radius: var(--radius-sm); padding: .55rem .75rem;
      font-size: .82rem; color: #4ade80; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
    </div>
    <span class="auth-logo-text">Synology Dashboard</span>
  </div>

  <a href="/" class="btn-back">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Zurück zum Dashboard
  </a>

  <div class="auth-title">Anmeldedaten ändern</div>
  <div class="auth-sub">Ändere Benutzername oder Passwort für das Dashboard.</div>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="auth-success">{{ success }}</div>
  {% endif %}

  <form method="post" action="/settings">
    <div class="form-section-label">Identität</div>
    <div class="form-group">
      <label class="form-label" for="username">Benutzername</label>
      <input class="form-input" type="text" id="username" name="username"
             value="{{ username or '' }}" autocomplete="username" required>
    </div>

    <hr class="form-divider">
    <div class="form-section-label">Passwort</div>

    <div class="form-group">
      <label class="form-label" for="current_password">Aktuelles Passwort</label>
      <input class="form-input" type="password" id="current_password" name="current_password"
             autocomplete="current-password" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="new_password">Neues Passwort</label>
      <input class="form-input" type="password" id="new_password" name="new_password"
             autocomplete="new-password" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="new_password2">Neues Passwort bestätigen</label>
      <input class="form-input" type="password" id="new_password2" name="new_password2"
             autocomplete="new-password" required>
    </div>

    <button class="btn-save" type="submit">Änderungen speichern</button>
  </form>
</div>
</body>
</html>
