<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — Synology Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .auth-logo {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.75rem;
    }
    .auth-logo-icon {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .auth-logo-icon svg { width: 20px; height: 20px; color: #fff; }
    .auth-logo-text { font-size: 1.1rem; font-weight: 700; }
    .auth-title { font-size: 1rem; font-weight: 600; margin-bottom: .25rem; }
    .auth-sub   { font-size: .8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    .form-label { font-size: .78rem; font-weight: 500; color: var(--text-muted); }
    .form-input {
      padding: .55rem .75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .9rem;
      font-family: var(--font);
      transition: border-color .15s;
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px var(--cyan-glow); }
    .btn-login {
      width: 100%; padding: .6rem; margin-top: .5rem;
      background: var(--cyan); border: none; border-radius: var(--radius-sm);
      color: #000; font-size: .9rem; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .auth-error {
      background: rgba(255,69,105,.1); border: 1px solid rgba(255,69,105,.3);
      border-radius: var(--radius-sm); padding: .55rem .75rem;
      font-size: .82rem; color: var(--red); margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
    </div>
    <span class="auth-logo-text">Synology Dashboard</span>
  </div>

  <div class="auth-title">Willkommen zurück</div>
  <div class="auth-sub">Bitte melde dich an um fortzufahren.</div>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
      <label class="form-label" for="username">Benutzername</label>
      <input class="form-input" type="text" id="username" name="username"
             value="{{ username or '' }}" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Passwort</label>
      <input class="form-input" type="password" id="password" name="password"
             autocomplete="current-password" required>
    </div>
    <button class="btn-login" type="submit">Anmelden</button>
  </form>
</div>
</body>
</html>
